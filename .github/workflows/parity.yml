# Engine parity gate — the Worker's JS engine must match the Python scanner
# verdict-for-verdict on the full corpus (311 cases x 5 channels = 1,555 pairs).
# SUNGLASSES_PIN must equal the ref patterns.js was compiled from
# (compile_patterns.py) — bump both together or this gate lies.
# PIN is a git SHA while the compiled source is unreleased main; flip it to
# the "v0.3.0" tag at release (plan: ~/SCAN_V030_PLAN_2026-07-11.md Block 6).
name: parity

on:
  push:
    branches: [main]
  pull_request:

env:
  SUNGLASSES_PIN: "a6914a9"  # scanner main @ PR#71 (1089 patterns, FP carrier-anchor sprint)

jobs:
  wide-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned scanner
        run: pip install "sunglasses @ git+https://github.com/sunglasses-dev/sunglasses.git@${SUNGLASSES_PIN}"
      - name: Wide parity (1,525 case-channel pairs)
        env:
          SUNGLASSES_SRC: /nonexistent  # force the installed package, not a source tree
        run: python3 wide_parity.py
