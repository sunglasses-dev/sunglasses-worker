# Engine parity gate — the Worker's JS engine must match the Python scanner
# verdict-for-verdict on the full corpus (311 cases x 5 channels = 1,555 pairs).
# The reference pin is read from PATTERNS_VERSION inside src/patterns.js —
# compile_patterns.py stamps it from the source engine, so the pin always
# travels in the same commit as the recompiled patterns. No manual bump.
name: parity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  wide-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Derive reference pin from compiled patterns
        run: |
          PIN="v$(grep -o 'PATTERNS_VERSION = "[^"]*"' src/patterns.js | cut -d'"' -f2)"
          echo "SUNGLASSES_PIN=${PIN}" >> "$GITHUB_ENV"
          echo "reference engine pin: ${PIN}"
      - name: Install pinned scanner
        run: pip install "sunglasses @ git+https://github.com/sunglasses-dev/sunglasses.git@${SUNGLASSES_PIN}"
      - name: Wide parity (1,525 case-channel pairs)
        env:
          SUNGLASSES_SRC: /nonexistent  # force the installed package, not a source tree
        run: python3 wide_parity.py
